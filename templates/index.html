<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Driver Sleep Detection AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="main-container">

    <div class="header">

        <h1>🚗 Driver Sleep Detection AI</h1>

        <p>Real-Time AI Driver Monitoring System</p>

    </div>

    <div class="video-wrapper">

        <img src="{{ url_for('video') }}"
             id="videoFeed">

    </div>

    <div class="button-group">

        <button id="startBtn">
            ▶ Start Detection
        </button>

        <button id="stopBtn">
            ⏹ Stop Detection
        </button>

    </div>

    <div class="info-panel">

        <div class="card">

            <h2>Status</h2>

            <p id="statusText">ACTIVE</p>

        </div>

        <div class="card">

            <h2>Alertness</h2>

            <p id="percentageText">100%</p>

        </div>

    </div>

</div>

<audio id="alarm" loop>
    <source src="{{ url_for('static', filename='Alarm.wav') }}">
</audio>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
